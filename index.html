:root {
  --bg:#09090F; --card:#13131C; --border:#222230;
  --gold:#F5C842; --red:#E8003D; --green:#00C864;
  --text:#F0F0F8; --muted:#55556A;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}

/* screens */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;transition:opacity .3s}
.screen.hidden{opacity:0;pointer-events:none}

/* ─── HOME ─── */
#home{justify-content:center;gap:28px;padding:32px;background:var(--bg)}
.home-logo{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:5px;
  background:linear-gradient(135deg,var(--gold),#fff 60%,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.home-sub{font-size:14px;color:var(--muted);text-align:center;max-width:260px;line-height:1.5}
.btn-big{width:100%;max-width:320px;padding:18px;border-radius:16px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;letter-spacing:.3px;
  background:linear-gradient(135deg,var(--red),#B00028);color:#fff;
  box-shadow:0 8px 24px rgba(232,0,61,.4);transition:transform .15s,opacity .15s}
.btn-big:active{transform:scale(.96)}
.btn-manual{background:var(--card);border:1px solid var(--border);color:var(--muted);box-shadow:none}
