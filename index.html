<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ESC Hitster">
<meta name="theme-color" content="#08080F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>ESC Hitster</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08080F; --surface:#111118; --border:#1E1E2E;
  --gold:#F5C842; --gold2:#E8A800; --red:#E8003D;
  --green:#00C864; --text:#EEEEF5; --muted:#55556A;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow:hidden; }

.stars { position:fixed; inset:0; pointer-events:none; }
.star { position:absolute; background:white; border-radius:50%; animation:tw var(--d,3s) var(--dl,0s) infinite alternate; }
@keyframes tw { from{opacity:.04} to{opacity:.5} }

.glow { position:fixed; top:35%; left:50%; transform:translate(-50%,-50%); width:400px; height:400px; border-radius:50%; background:radial-gradient(circle,rgba(232,0,61,.1) 0%,transparent 70%); pointer-events:none; transition:background 1s; }
.glow.on { background:radial-gradient(circle,rgba(0,200,100,.12) 0%,transparent 70%); }

.screen { position:fixed; inset:0; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .3s,transform .3s; }
.screen.hidden { opacity:0; pointer-events:none; transform:scale(.97); }

/* ══ SCAN SCREEN ══ */
#scanScreen { background:var(--bg); gap:0; justify-content:center; padding:40px 32px; }

.scan-header {
  position:absolute; top:0; left:0; right:0;
  padding:max(env(safe-area-inset-top),24px) 24px 16px;
  display:flex; align-items:center; gap:10px;
  background:linear-gradient(to bottom,var(--bg) 70%,transparent);
}
.hrt { width:24px; height:24px; color:var(--red); flex-shrink:0; }
.htitle { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; background:linear-gradient(135deg,var(--gold),#fff 60%,var(--gold2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

/* Big scan button */
.scan-card {
  width:100%; max-width:340px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  padding:40px 32px;
  display:flex; flex-direction:column;
  align-items:center; gap:20px;
  position:relative; overflow:hidden;
}
.scan-card::before {
  content:''; position:absolute; top:0; left:10%; right:10%; height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

.scan-icon-wrap {
  width:100px; height:100px;
  border-radius:50%;
  background:linear-gradient(135deg,rgba(232,0,61,.15),rgba(232,0,61,.05));
  border:1px solid rgba(232,0,61,.2);
  display:flex; align-items:center; justify-content:center;
  animation:breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { transform:scale(1); box-shadow:0 0 0 0 rgba(232,0,61,.2); }
  50%      { transform:scale(1.04); box-shadow:0 0 0 12px rgba(232,0,61,0); }
}

.scan-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--text); }
.scan-sub { font-size:13px; color:var(--muted); text-align:center; line-height:1.6; max-width:220px; }

/* The actual scan button – styled beautifully */
.scan-trigger {
  width:100%;
  background:linear-gradient(135deg,var(--red),#C00030);
  border:none; border-radius:16px;
  color:white; font-family:'DM Sans',sans-serif;
  font-size:16px; font-weight:600; letter-spacing:0.3px;
  padding:18px; cursor:pointer;
  box-shadow:0 8px 24px rgba(232,0,61,.4);
  display:flex; align-items:center; justify-content:center; gap:10px;
  transition:transform .15s, opacity .15s;
  -webkit-appearance:none;
  position:relative; z-index:5;
}
.scan-trigger:active { transform:scale(.97); opacity:.9; }
.scan-trigger svg { width:22px; height:22px; flex-shrink:0; }

/* Hidden file input */
#qrInput {
  position:absolute; opacity:0; width:1px; height:1px;
  pointer-events:none; top:-100px;
}

.scan-status { font-size:13px; color:var(--muted); text-align:center; min-height:20px; }
.scan-status.ok  { color:var(--green); }
.scan-status.err { color:var(--red); }

/* Canvas for processing */
#processCanvas { display:none; }

/* ══ PLAY SCREEN ══ */
#playScreen {
  padding:24px;
  padding-top:max(env(safe-area-inset-top),24px);
  padding-bottom:max(env(safe-area-inset-bottom),24px);
  justify-content:flex-start;
  background:var(--bg); gap:16px;
}

.play-header { width:100%; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.btn-next {
  display:flex; align-items:center; gap:8px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:50px; padding:10px 18px;
  color:var(--muted); font-family:'DM Sans',sans-serif;
  font-size:13px; font-weight:600; cursor:pointer;
  -webkit-appearance:none;
}
.btn-next svg { width:14px; height:14px; }

.mystery {
  width:100%; max-width:400px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:28px 24px;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  position:relative; overflow:hidden; flex-shrink:0;
}
.mystery::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(-45deg,transparent,transparent 12px,rgba(255,255,255,.015) 12px,rgba(255,255,255,.015) 24px); }
.mlck { font-size:30px; position:relative; z-index:1; }
.mhint { font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--muted); position:relative; z-index:1; }

.revcard {
  width:100%; max-width:400px;
  background:linear-gradient(135deg,rgba(245,200,66,.1),rgba(245,200,66,.03));
  border:1px solid rgba(245,200,66,.3); border-radius:20px;
  padding:20px; display:none; flex-direction:column; gap:8px;
  animation:pop .4s cubic-bezier(.34,1.56,.64,1) both; flex-shrink:0;
}
@keyframes pop { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
.ry { font-family:'Bebas Neue',sans-serif; font-size:48px; line-height:1; letter-spacing:3px; background:linear-gradient(135deg,var(--gold),#fff 50%,var(--gold2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.rt { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; line-height:1.1; }
.ra { font-size:14px; font-weight:600; color:var(--gold); }
.rmeta { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
.tag { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:4px 10px; border-radius:50px; background:rgba(255,255,255,.06); color:var(--muted); border:1px solid var(--border); }
.tag.g { background:rgba(245,200,66,.1); color:var(--gold); border-color:rgba(245,200,66,.25); }

.player { width:100%; max-width:400px; display:flex; flex-direction:column; align-items:center; gap:14px; flex-shrink:0; }
.pw { width:100%; display:flex; align-items:center; gap:12px; }
.pbar { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.pfill { height:100%; width:0%; background:linear-gradient(90deg,var(--red),var(--gold)); border-radius:2px; transition:width .5s linear; }
.tlbl { font-size:12px; color:var(--muted); min-width:36px; text-align:right; font-variant-numeric:tabular-nums; }

.pbtn { width:76px; height:76px; border-radius:50%; background:linear-gradient(135deg,var(--red),#C00030); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 28px rgba(232,0,61,.45); -webkit-appearance:none; }
.pbtn.on { background:linear-gradient(135deg,var(--green),#009948); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 8px 28px rgba(0,200,100,.4)} 50%{box-shadow:0 8px 40px rgba(0,200,100,.7),0 0 0 12px rgba(0,200,100,.08)} }
.pbtn svg { width:30px; height:30px; fill:white; }
.iplay{display:block;}.ipause{display:none;}
.pbtn.on .iplay{display:none;}.pbtn.on .ipause{display:block;}

.stat { font-size:13px; color:var(--muted); text-align:center; min-height:18px; }
.stat.ok{color:var(--green);}.stat.err{color:var(--red);}

.btns { width:100%; max-width:400px; }
.btn { width:100%; padding:14px; border-radius:14px; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; -webkit-appearance:none; }
.btn.done { background:rgba(245,200,66,.08); border-color:rgba(245,200,66,.3); color:var(--gold); }

.cf { position:fixed; inset:0; pointer-events:none; z-index:999; overflow:hidden; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow" id="glow"></div>

<!-- ══ SCAN SCREEN ══ -->
<div class="screen" id="scanScreen">
  <div class="scan-header">
    <svg class="hrt" viewBox="0 0 100 90" fill="none" stroke="currentColor" stroke-width="8" stroke-linejoin="round">
      <path d="M50 80C50 80 5 50 5 25C5 12 14 4 26 4C35 4 44 10 50 20C56 10 65 4 74 4C86 4 95 12 95 25C95 50 50 80 50 80Z"/>
    </svg>
    <div class="htitle">Eurovision Hitster</div>
  </div>

  <div class="scan-card">
    <div class="scan-icon-wrap">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="1.5">
        <path d="M15 3h4a2 2 0 012 2v4M9 3H5a2 2 0 00-2 2v4M15 21h4a2 2 0 002-2v-4M9 21H5a2 2 0 01-2-2v-4"/>
        <rect x="7" y="7" width="10" height="10" rx="1.5"/>
      </svg>
    </div>

    <div class="scan-title">Karte scannen</div>
    <div class="scan-sub">Tippe den Button, richte die Kamera auf eine ESC-Karte und fotografiere den QR-Code</div>

    <!-- Hidden file input – triggers native iOS camera with QR scan -->
    <input type="file" id="qrInput" accept="image/*" capture="environment">

    <button class="scan-trigger" id="scanBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Karte fotografieren
    </button>

    <div class="scan-status" id="scanStatus">Bereit zum Scannen</div>
  </div>

  <canvas id="processCanvas"></canvas>
</div>

<!-- ══ PLAY SCREEN ══ -->
<div class="screen hidden" id="playScreen">
  <div class="play-header">
    <svg class="hrt" viewBox="0 0 100 90" fill="none" stroke="currentColor" stroke-width="8" stroke-linejoin="round">
      <path d="M50 80C50 80 5 50 5 25C5 12 14 4 26 4C35 4 44 10 50 20C56 10 65 4 74 4C86 4 95 12 95 25C95 50 50 80 50 80Z"/>
    </svg>
    <button class="btn-next" id="btnNext">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
        <rect x="7" y="7" width="10" height="10" rx="1"/>
      </svg>
      Nächste Karte
    </button>
  </div>

  <div class="mystery" id="mystery">
    <div class="mlck">🔒</div>
    <div class="mhint">Wann war das?</div>
  </div>

  <div class="revcard" id="revcard">
    <div class="ry" id="rY">—</div>
    <div class="rt"  id="rT">—</div>
    <div class="ra"  id="rA">—</div>
    <div class="rmeta">
      <span class="tag"   id="rC">—</span>
      <span class="tag g" id="rP">—</span>
    </div>
  </div>

  <div class="player">
    <div class="pw">
      <div class="pbar"><div class="pfill" id="pfill"></div></div>
      <div class="tlbl" id="tlbl">—</div>
    </div>
    <button class="pbtn" id="pbtn">
      <svg class="iplay"  viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg class="ipause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <div class="stat" id="stat">—</div>
    <div class="btns">
      <button class="btn" id="rbtn">🔓 Auflösen</button>
    </div>
  </div>
</div>

<div class="cf" id="cf"></div>
<audio id="aud" preload="none"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script>
// ── Stars ─────────────────────────────────────────────────────────────
const se=document.getElementById('stars');
for(let i=0;i<50;i++){const s=document.createElement('div');s.className='star';const z=1+Math.random()*2;s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${z}px;height:${z}px;--d:${2+Math.random()*4}s;--dl:${Math.random()*5}s`;se.appendChild(s);}

// ── State ─────────────────────────────────────────────────────────────
const aud = document.getElementById('aud');
let playing=false, revealed=false, pt=null;

function setStat(m,c){const e=document.getElementById('stat');e.textContent=m;e.className='stat'+(c?' '+c:'');}
function setScanStatus(m,c){const e=document.getElementById('scanStatus');e.textContent=m;e.className='scan-status'+(c?' '+c:'');}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}

// ── QR via file input (native iOS camera) ────────────────────────────
function triggerScan() {
  // Reset input so same file can be selected again
  const input = document.getElementById('qrInput');
  input.value = '';
  input.click();
}

document.getElementById('qrInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  setScanStatus('Verarbeite Foto…', '');

  const img = new Image();
  const url = URL.createObjectURL(file);

  img.onload = function() {
    const canvas = document.getElementById('processCanvas');
    const ctx = canvas.getContext('2d');

    // Draw image to canvas
    canvas.width  = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    // Get image data for jsQR
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);

    // Try scanning
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: 'attemptBoth'
    });

    if (code && code.data) {
      setScanStatus('✅ Code erkannt!', 'ok');
      handleQR(code.data);
    } else {
      // Try with downscaled version for better detection
      const scale = Math.min(1, 1200 / Math.max(img.width, img.height));
      canvas.width  = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const imageData2 = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code2 = jsQR(imageData2.data, imageData2.width, imageData2.height, {
        inversionAttempts: 'attemptBoth'
      });
      if (code2 && code2.data) {
        setScanStatus('✅ Code erkannt!', 'ok');
        handleQR(code2.data);
      } else {
        setScanStatus('❌ QR-Code nicht erkannt – nochmal versuchen', 'err');
      }
    }
  };

  img.onerror = () => setScanStatus('Fehler beim Laden des Fotos', 'err');
  img.src = url;
});

// ── QR Handler ────────────────────────────────────────────────────────
function handleQR(data) {
  let song = null;
  try {
    const url = new URL(data);
    const p = url.searchParams;
    if (p.get('y') && p.get('t') && p.get('a')) {
      song = {
        year: p.get('y'), title: p.get('t'), artist: p.get('a'),
        country: p.get('c')||'—', flag: p.get('f')||'🎵',
        place: p.get('p')||'—', sid: p.get('sid')||null
      };
    }
  } catch(e) {}

  if (!song) {
    setScanStatus('Kein ESC QR-Code erkannt', 'err');
    return;
  }
  loadSong(song);
}

// ── Load Song ─────────────────────────────────────────────────────────
function loadSong(song) {
  aud.pause(); aud.src = '';
  clearInterval(pt);
  playing=false; revealed=false;

  document.getElementById('mystery').style.display  = 'flex';
  document.getElementById('revcard').style.display  = 'none';
  document.getElementById('rbtn').className         = 'btn';
  document.getElementById('rbtn').textContent       = '🔓 Auflösen';
  document.getElementById('pbtn').classList.remove('on');
  document.getElementById('glow').classList.remove('on');
  document.getElementById('pfill').style.width      = '0%';
  document.getElementById('tlbl').textContent       = '—';

  document.getElementById('rY').textContent  = song.year;
  document.getElementById('rT').textContent  = song.title;
  document.getElementById('rA').textContent  = song.artist;
  document.getElementById('rC').innerHTML    = song.flag + ' ' + song.country;
  document.getElementById('rP').textContent  = song.place !== '—' ? 'Platz ' + song.place : 'ESC';

  show('playScreen');
  setStat('Suche Preview…', '');
  fetchPreview(song);
}

// ── iTunes Preview ────────────────────────────────────────────────────
async function fetchPreview(song) {
  if (song.sid) {
    try {
      const r = await fetch('https://itunes.apple.com/lookup?id=' + song.sid);
      const d = await r.json();
      const hit = (d.results||[]).find(x => x.previewUrl);
      if (hit) { setAudio(hit.previewUrl); return; }
    } catch(e) {}
  }
  try {
    const q = encodeURIComponent(song.artist + ' ' + song.title);
    const r = await fetch('https://itunes.apple.com/search?term=' + q + '&media=music&entity=song&limit=10&country=de');
    const d = await r.json();
    const hit = (d.results||[]).find(x => x.previewUrl);
    if (hit) { setAudio(hit.previewUrl); return; }
  } catch(e) {}
  setStat('Keine Vorschau gefunden', 'err');
}

function setAudio(url) {
  aud.src = url; aud.load();
  document.getElementById('tlbl').textContent = '0:30';
  setStat('Bereit – tippe ▶', '');
}

// ── Playback ──────────────────────────────────────────────────────────
function togglePlay() {
  if (!aud.src || aud.src === location.href) { setStat('Kein Song geladen','err'); return; }
  if (playing) {
    aud.pause(); playing=false;
    document.getElementById('pbtn').classList.remove('on');
    document.getElementById('glow').classList.remove('on');
    clearInterval(pt); setStat('Pausiert','');
  } else {
    aud.play().then(() => {
      playing=true;
      document.getElementById('pbtn').classList.add('on');
      document.getElementById('glow').classList.add('on');
      setStat('♫ Spielt…','ok');
      pt = setInterval(() => {
        if (!aud.duration) return;
        document.getElementById('pfill').style.width = (aud.currentTime/aud.duration*100)+'%';
        const r = Math.max(0, Math.ceil(aud.duration-aud.currentTime));
        document.getElementById('tlbl').textContent = Math.floor(r/60)+':'+String(r%60).padStart(2,'0');
      }, 500);
    }).catch(e => setStat('Fehler: '+e.message,'err'));
  }
}

aud.addEventListener('ended', () => {
  playing=false;
  document.getElementById('pbtn').classList.remove('on');
  document.getElementById('glow').classList.remove('on');
  document.getElementById('pfill').style.width='100%';
  document.getElementById('tlbl').textContent='0:00';
  clearInterval(pt); setStat('Fertig – Auflösen?','');
});

// ── Reveal ────────────────────────────────────────────────────────────
function reveal() {
  if (revealed) return; revealed=true;
  document.getElementById('mystery').style.display='none';
  document.getElementById('revcard').style.display='flex';
  document.getElementById('rbtn').className='btn done';
  document.getElementById('rbtn').textContent='✓ Aufgedeckt';
  const cols=['#F5C842','#E8003D','#fff','#00C864','#4488FF'];
  const c=document.getElementById('cf');
  for(let i=0;i<36;i++){
    const el=document.createElement('div');
    const sz=5+Math.random()*9,tx=(Math.random()-.5)*300,ty=-(80+Math.random()*220),rot=Math.random()*720,dl=Math.random()*.3;
    el.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${cols[i%5]};border-radius:${Math.random()>.5?'50%':'2px'};left:${35+Math.random()*30}%;top:55%;animation:cf${i} ${.8+Math.random()*.4}s ${dl}s ease-out forwards`;
    const st=document.createElement('style');
    st.textContent=`@keyframes cf${i}{to{transform:translate(${tx}px,${ty}px) rotate(${rot}deg);opacity:0}}`;
    document.head.appendChild(st);c.appendChild(el);
    setTimeout(()=>{el.remove();st.remove();},1400);
  }
}

// ── Navigation ────────────────────────────────────────────────────────
function goScan() {
  aud.pause(); aud.src=''; playing=false; clearInterval(pt);
  setScanStatus('Bereit zum Scannen','');
  show('scanScreen');
}

// ── Wire up buttons ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('scanBtn').addEventListener('click', triggerScan);
  document.getElementById('pbtn').addEventListener('click', togglePlay);
  document.getElementById('rbtn').addEventListener('click', reveal);
  document.getElementById('btnNext').addEventListener('click', goScan);
});

// ── Direct URL load ───────────────────────────────────────────────────
window.addEventListener('load', () => {
  const p = new URLSearchParams(location.search);
  if (p.get('y') && p.get('t') && p.get('a')) {
    handleQR(location.href);
  }
});
</script>
</body>
</html>
