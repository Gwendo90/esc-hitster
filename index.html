<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ESC Hitster</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08080F; --surface:#111118; --border:#1E1E2E;
  --gold:#F5C842; --gold2:#E8A800; --red:#E8003D;
  --green:#00C864; --text:#EEEEF5; --muted:#55556A;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow:hidden; }

.stars { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
.star { position:absolute; background:white; border-radius:50%; animation:twinkle var(--d,3s) var(--delay,0s) infinite alternate; }
@keyframes twinkle { from{opacity:.05} to{opacity:.5} }

.glow { position:fixed; top:35%; left:50%; transform:translate(-50%,-50%); width:400px; height:400px; border-radius:50%; background:radial-gradient(circle,rgba(232,0,61,.1) 0%,transparent 70%); pointer-events:none; transition:background 1s; }
.glow.on { background:radial-gradient(circle,rgba(0,200,100,.12) 0%,transparent 70%); }

.card { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; gap:18px; }

.header { position:absolute; top:0; left:0; right:0; padding:max(env(safe-area-inset-top),20px) 24px 14px; display:flex; align-items:center; gap:10px; background:linear-gradient(to bottom,var(--bg) 60%,transparent); }
.hrt { width:24px; height:24px; color:var(--red); }
.htitle { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; background:linear-gradient(135deg,var(--gold),#fff 60%,var(--gold2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

/* mystery */
.mystery { width:100%; max-width:400px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:32px 24px; display:flex; flex-direction:column; align-items:center; gap:10px; position:relative; overflow:hidden; }
.mystery::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(-45deg,transparent,transparent 12px,rgba(255,255,255,.015) 12px,rgba(255,255,255,.015) 24px); }
.mlck { font-size:34px; position:relative; z-index:1; }
.mhint { font-size:12px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--muted); position:relative; z-index:1; }

/* revealed */
.revcard { width:100%; max-width:400px; background:linear-gradient(135deg,rgba(245,200,66,.1),rgba(245,200,66,.03)); border:1px solid rgba(245,200,66,.3); border-radius:20px; padding:20px; display:none; flex-direction:column; gap:8px; animation:pop .4s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes pop { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
.ry { font-family:'Bebas Neue',sans-serif; font-size:50px; line-height:1; letter-spacing:3px; background:linear-gradient(135deg,var(--gold),#fff 50%,var(--gold2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.rt { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:1px; line-height:1.1; }
.ra { font-size:14px; font-weight:600; color:var(--gold); }
.rmeta { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
.tag { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:4px 10px; border-radius:50px; background:rgba(255,255,255,.06); color:var(--muted); border:1px solid var(--border); }
.tag.g { background:rgba(245,200,66,.1); color:var(--gold); border-color:rgba(245,200,66,.25); }

/* progress */
.pw { width:100%; max-width:400px; display:flex; align-items:center; gap:12px; }
.pbar { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.pfill { height:100%; width:0%; background:linear-gradient(90deg,var(--red),var(--gold)); border-radius:2px; transition:width .5s linear; }
.tlbl { font-size:12px; color:var(--muted); min-width:36px; text-align:right; font-variant-numeric:tabular-nums; }

/* play btn */
.pbtn { width:78px; height:78px; border-radius:50%; background:linear-gradient(135deg,var(--red),#C00030); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 28px rgba(232,0,61,.45); transition:transform .15s,box-shadow .3s; }
.pbtn:active { transform:scale(.92); }
.pbtn.on { background:linear-gradient(135deg,var(--green),#009948); box-shadow:0 8px 28px rgba(0,200,100,.4); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 8px 28px rgba(0,200,100,.4)} 50%{box-shadow:0 8px 40px rgba(0,200,100,.7),0 0 0 12px rgba(0,200,100,.08)} }
.pbtn svg { width:30px; height:30px; fill:white; }
.iplay { display:block; } .ipause { display:none; }
.pbtn.on .iplay { display:none; } .pbtn.on .ipause { display:block; }

.stat { font-size:13px; color:var(--muted); text-align:center; min-height:18px; }
.stat.ok { color:var(--green); } .stat.err { color:var(--red); }

.btns { width:100%; max-width:400px; display:flex; gap:12px; }
.btn { flex:1; padding:14px; border-radius:14px; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; transition:all .2s; }
.btn:hover { border-color:var(--gold); color:var(--gold); }
.btn.done { background:rgba(245,200,66,.08); border-color:rgba(245,200,66,.3); color:var(--gold); }

/* loading */
.loader { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:100; transition:opacity .4s; }
.loader.out { opacity:0; pointer-events:none; }
.lhrt { font-size:44px; animation:hb 1s ease-in-out infinite; }
@keyframes hb { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
.ltxt { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:4px; color:var(--muted); }

/* empty */
.empty { position:fixed; inset:0; background:var(--bg); display:none; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:40px; text-align:center; }
.etitle { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:2px; color:var(--gold); }
.esub { font-size:14px; color:var(--muted); line-height:1.6; max-width:280px; }

.cf { position:fixed; inset:0; pointer-events:none; z-index:999; overflow:hidden; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow" id="glow"></div>

<div class="loader" id="loader">
  <div class="lhrt">♥</div>
  <div class="ltxt">Eurovision Hitster</div>
</div>

<div class="empty" id="empty">
  <div class="lhrt">🎵</div>
  <div class="etitle">Karte scannen</div>
  <div class="esub">Öffne die Kamera-App, scanne eine ESC-Karte und das Spiel startet automatisch.</div>
</div>

<div class="card" id="card" style="display:none">
  <div class="header">
    <svg class="hrt" viewBox="0 0 100 90" fill="none" stroke="currentColor" stroke-width="8" stroke-linejoin="round">
      <path d="M50 80C50 80 5 50 5 25C5 12 14 4 26 4C35 4 44 10 50 20C56 10 65 4 74 4C86 4 95 12 95 25C95 50 50 80 50 80Z"/>
    </svg>
    <div class="htitle">Eurovision Hitster</div>
  </div>

  <div class="mystery" id="mystery">
    <div class="mlck">🔒</div>
    <div class="mhint">Wann war das?</div>
  </div>

  <div class="revcard" id="revcard">
    <div class="ry" id="rY">—</div>
    <div class="rt"  id="rT">—</div>
    <div class="ra"  id="rA">—</div>
    <div class="rmeta">
      <span class="tag"   id="rC">—</span>
      <span class="tag g" id="rP">—</span>
    </div>
  </div>

  <div class="pw">
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
    <div class="tlbl" id="tlbl">—</div>
  </div>

  <button class="pbtn" id="pbtn" onclick="togglePlay()">
    <svg class="iplay"  viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    <svg class="ipause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
  </button>

  <div class="stat" id="stat">Lädt…</div>

  <div class="btns">
    <button class="btn" id="rbtn" onclick="reveal()">🔓 Auflösen</button>
  </div>
</div>

<div class="cf" id="cf"></div>
<audio id="aud" preload="none"></audio>

<script>
// Stars
const se = document.getElementById('stars');
for(let i=0;i<50;i++){
  const s=document.createElement('div'); s.className='star';
  const z=1+Math.random()*2;
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${z}px;height:${z}px;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s`;
  se.appendChild(s);
}

const aud=document.getElementById('aud');
let playing=false, revealed=false, pt=null;

// Parse URL
const P=new URLSearchParams(window.location.search);
const song={
  year:   P.get('y'),
  title:  P.get('t'),
  artist: P.get('a'),
  country:P.get('c')||'—',
  flag:   P.get('f')||'🎵',
  place:  P.get('p')||'—',
  sid:    P.get('sid')||null,  // iTunes Song ID
};

function setS(m,c){const e=document.getElementById('stat');e.textContent=m;e.className='stat'+(c?' '+c:'');}

window.addEventListener('load',async()=>{
  await new Promise(r=>setTimeout(r,700));

  if(!song.year||!song.title||!song.artist){
    document.getElementById('loader').classList.add('out');
    setTimeout(()=>{
      document.getElementById('loader').style.display='none';
      document.getElementById('empty').style.display='flex';
    },400);
    return;
  }

  // Fill hidden reveal data
  document.getElementById('rY').textContent  = song.year;
  document.getElementById('rT').textContent  = song.title;
  document.getElementById('rA').textContent  = song.artist;
  document.getElementById('rC').innerHTML    = song.flag+' '+song.country;
  document.getElementById('rP').textContent  = song.place!=='—'?'Platz '+song.place:'ESC';

  document.getElementById('loader').classList.add('out');
  setTimeout(()=>{
    document.getElementById('loader').style.display='none';
    document.getElementById('card').style.display='flex';
  },400);

  setS('Suche Preview…','');
  await loadPreview();
});

async function loadPreview(){
  // Strategy 1: Use iTunes song ID directly from QR code
  if(song.sid){
    try{
      const r=await fetch(`https://itunes.apple.com/lookup?id=${song.sid}`);
      const d=await r.json();
      const hit=(d.results||[]).find(x=>x.previewUrl);
      if(hit){setAudio(hit.previewUrl);return;}
    }catch(e){}
  }

  // Strategy 2: Search by artist + title
  try{
    const q=encodeURIComponent(`${song.artist} ${song.title}`);
    const r=await fetch(`https://itunes.apple.com/search?term=${q}&media=music&entity=song&limit=10&country=de`);
    const d=await r.json();
    const hit=(d.results||[]).find(x=>x.previewUrl);
    if(hit){setAudio(hit.previewUrl);return;}
  }catch(e){}

  // Strategy 3: Search by title only
  try{
    const q=encodeURIComponent(song.title);
    const r=await fetch(`https://itunes.apple.com/search?term=${q}&media=music&entity=song&limit=10`);
    const d=await r.json();
    const hit=(d.results||[]).find(x=>x.previewUrl);
    if(hit){setAudio(hit.previewUrl);return;}
  }catch(e){}

  setS('Keine Vorschau gefunden','err');
}

function setAudio(url){
  aud.src=url; aud.load();
  document.getElementById('tlbl').textContent='0:30';
  setS('Bereit – tippe ▶','');
}

function togglePlay(){
  if(!aud.src||aud.src===location.href){setS('Kein Song geladen','err');return;}
  if(playing){
    aud.pause();playing=false;
    document.getElementById('pbtn').classList.remove('on');
    document.getElementById('glow').classList.remove('on');
    clearInterval(pt);setS('Pausiert','');
  } else {
    aud.play().then(()=>{
      playing=true;
      document.getElementById('pbtn').classList.add('on');
      document.getElementById('glow').classList.add('on');
      setS('♫ Spielt…','ok');
      pt=setInterval(()=>{
        if(!aud.duration)return;
        document.getElementById('pfill').style.width=(aud.currentTime/aud.duration*100)+'%';
        const r=Math.max(0,Math.ceil(aud.duration-aud.currentTime));
        document.getElementById('tlbl').textContent=Math.floor(r/60)+':'+String(r%60).padStart(2,'0');
      },500);
    }).catch(e=>setS('Fehler: '+e.message,'err'));
  }
}

aud.addEventListener('ended',()=>{
  playing=false;
  document.getElementById('pbtn').classList.remove('on');
  document.getElementById('glow').classList.remove('on');
  document.getElementById('pfill').style.width='100%';
  document.getElementById('tlbl').textContent='0:00';
  clearInterval(pt);setS('Fertig – was tippst du?','');
});

function reveal(){
  if(revealed)return;revealed=true;
  document.getElementById('mystery').style.display='none';
  document.getElementById('revcard').style.display='flex';
  document.getElementById('rbtn').className='btn done';
  document.getElementById('rbtn').textContent='✓ Aufgedeckt';
  // Confetti
  const cols=['#F5C842','#E8003D','#fff','#00C864','#4488FF'];
  const c=document.getElementById('cf');
  for(let i=0;i<36;i++){
    const el=document.createElement('div');
    const sz=5+Math.random()*9,tx=(Math.random()-.5)*300,ty=-(80+Math.random()*220),rot=Math.random()*720,dl=Math.random()*.3;
    el.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${cols[i%5]};border-radius:${Math.random()>.5?'50%':'2px'};left:${35+Math.random()*30}%;top:55%;animation:cf${i} ${.8+Math.random()*.4}s ${dl}s ease-out forwards`;
    const st=document.createElement('style');
    st.textContent=`@keyframes cf${i}{to{transform:translate(${tx}px,${ty}px) rotate(${rot}deg);opacity:0}}`;
    document.head.appendChild(st);c.appendChild(el);
    setTimeout(()=>{el.remove();st.remove();},1400);
  }
}
</script>
</body>
</html>
